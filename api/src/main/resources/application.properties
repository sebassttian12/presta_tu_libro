
spring.application.name=api


spring.datasource.url=jdbc:mysql://localhost:${DB_PORT_DB}/${DB_NAME_DB}
spring.datasource.username=${DB_USER_NAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mostrar las consultas SQL generadas por Hibernate
spring.jpa.show-sql=true

# Estrategia de generación de tablas
# create  -> elimina y crea nuevamente las tablas al iniciar
# update  -> actualiza tablas sin borrar los datos

spring.jpa.hibernate.ddl-auto=create

# Mostrar consultas SQL en consola
logging.level.org.hibernate.SQL=DEBUG
